<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .pillars { display: flex; width: 100%; height: 500px; gap: 8px; }
  .pillar { flex: 1; position: relative; overflow: hidden; cursor: pointer; }
  .pillar img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(100%); transition: filter 0.4s ease; }
  .pillar-overlay { position: absolute; inset: 0; background: #bd0000; opacity: 0; transition: opacity 0.4s ease; }
  .pillar-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 72px; color: #fff; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); letter-spacing: 0.05em; z-index: 2; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); transition: color 0.4s ease; }
  .pillar:hover .pillar-overlay { opacity: 0.85; }
  .pillar:hover img { filter: grayscale(100%) brightness(0.4); }
</style>
</head>
<body>
<div class="pillars">
  <div class="pillar">
    <img src="https://images.unsplash.com/photo-1554415707-6e8cfc93fe23?w=600&q=80" alt="Strategy" />
    <div class="pillar-overlay"></div>
    <div class="pillar-label">Strategy</div>
  </div>
  <div class="pillar">
    <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=600&q=80" alt="Talent" />
    <div class="pillar-overlay"></div>
    <div class="pillar-label">Talent</div>
  </div>
  <div class="pillar">
    <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=600&q=80" alt="Editorial" />
    <div class="pillar-overlay"></div>
    <div class="pillar-label">Editorial</div>
  </div>
</div>
</body>
</html>
